grafana:
  adminPassword: devsecops123

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
          isDefault: true
          uid: prometheus
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          isDefault: false
          uid: loki

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: DevSecOps
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      devsecops-dashboard:
        json: |
          {
            "uid": "7c8d4ba2-4ab3-4bb4-897b-ce2423d0089d",
            "title": "DevSecOps Security Dashboard",
            "refresh": "30s",
            "style": "dark",
            "tags": ["security","falco","devsecops"],
            "schemaVersion": 38,
            "version": 11,
            "time": {"from": "now-24h", "to": "now"},
            "panels": [
              {"id":1,"title":"CRITICAL Alerts","type":"stat","gridPos":{"h":4,"w":6,"x":0,"y":0},"datasource":{"type":"loki","uid":"loki"},"options":{"colorMode":"background","graphMode":"none","textMode":"auto","reduceOptions":{"calcs":["lastNotNull"]}},"fieldConfig":{"defaults":{"color":{"fixedColor":"red","mode":"fixed"},"thresholds":{"mode":"absolute","steps":[{"color":"red","value":0}]}}},"targets":[{"expr":"sum(count_over_time({app=\"falco\"} | json | priority=\"Critical\" [24h]))","refId":"A","instant":false}]},
              {"id":2,"title":"WARNING Alerts","type":"stat","gridPos":{"h":4,"w":6,"x":6,"y":0},"datasource":{"type":"loki","uid":"loki"},"options":{"colorMode":"background","graphMode":"none","textMode":"auto","reduceOptions":{"calcs":["lastNotNull"]}},"fieldConfig":{"defaults":{"color":{"fixedColor":"yellow","mode":"fixed"},"thresholds":{"mode":"absolute","steps":[{"color":"yellow","value":0}]}}},"targets":[{"expr":"sum(count_over_time({app=\"falco\"} | json | priority=\"Warning\" [24h]))","refId":"A","instant":false}]},
              {"id":3,"title":"NOTICE Alerts","type":"stat","gridPos":{"h":4,"w":6,"x":12,"y":0},"datasource":{"type":"loki","uid":"loki"},"options":{"colorMode":"background","graphMode":"none","textMode":"auto","reduceOptions":{"calcs":["lastNotNull"]}},"fieldConfig":{"defaults":{"color":{"fixedColor":"green","mode":"fixed"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":0}]}}},"targets":[{"expr":"sum(count_over_time({app=\"falco\"} | json | priority=\"Notice\" [24h]))","refId":"A","instant":false}]},
              {"id":7,"title":"Cluster Health","type":"stat","gridPos":{"h":4,"w":6,"x":18,"y":0},"datasource":{"type":"prometheus","uid":"prometheus"},"options":{"colorMode":"background","graphMode":"none","textMode":"auto","reduceOptions":{"calcs":["lastNotNull"]}},"fieldConfig":{"defaults":{"unit":"percent","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":0},{"color":"yellow","value":80},{"color":"red","value":90}]}}},"targets":[{"expr":"100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)","refId":"A"}]},
              {"id":5,"title":"Falco Alerts Over Time","type":"timeseries","gridPos":{"h":8,"w":24,"x":0,"y":4},"datasource":{"type":"loki","uid":"loki"},"fieldConfig":{"defaults":{"color":{"mode":"palette-classic"}}},"targets":[{"expr":"sum(count_over_time({app=\"falco\"} |= \"Warning\" [1m]))","legendFormat":"Warning","refId":"A"},{"expr":"sum(count_over_time({app=\"falco\"} |= \"Notice\" [1m]))","legendFormat":"Notice","refId":"B"},{"expr":"sum(count_over_time({app=\"falco\"} |= \"Critical\" [1m]))","legendFormat":"Critical","refId":"C"}]},
              {"id":6,"title":"Warning Security Alerts","type":"logs","gridPos":{"h":8,"w":12,"x":0,"y":12},"datasource":{"type":"loki","uid":"loki"},"options":{"dedupStrategy":"none","enableLogDetails":true,"showTime":true},"targets":[{"expr":"{app=\"falco\"} |= \"Warning\"","refId":"A"}]},
              {"id":4,"title":"Notice Security Alerts","type":"logs","gridPos":{"h":8,"w":12,"x":12,"y":12},"datasource":{"type":"loki","uid":"loki"},"options":{"dedupStrategy":"none","enableLogDetails":true,"showTime":true},"targets":[{"expr":"{app=\"falco\"} |= \"Notice\"","refId":"A"}]},
              {"id":8,"title":"Cluster CPU Usage","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":20},"datasource":{"type":"prometheus","uid":"prometheus"},"fieldConfig":{"defaults":{"unit":"percent","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":0},{"color":"yellow","value":70},{"color":"red","value":90}]}}},"targets":[{"expr":"100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)","legendFormat":"{{instance}}","refId":"A"}]},
              {"id":9,"title":"Cluster Memory Usage","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":20},"datasource":{"type":"prometheus","uid":"prometheus"},"fieldConfig":{"defaults":{"unit":"percent","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":0},{"color":"yellow","value":70},{"color":"red","value":90}]}}},"targets":[{"expr":"(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100","legendFormat":"{{instance}}","refId":"A"}]}
            ]
          }
