name: GitOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          find . -name "*.yaml" -path "*/apps/*" | xargs -I {} kubeconform -strict {}
          echo "✅ All manifests are valid!"

  security-scan:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan all Kubernetes configs
        run: |
          echo "🔍 Scanning Kubernetes configurations..."
          trivy config --severity HIGH,CRITICAL .
          echo "✅ Config scan completed!"

      - name: Extract and scan all images
        run: |
          echo "🔍 Extracting images from manifests..."
          images=$(grep -r "image:" apps/ | awk '{print $NF}' | sort -u)
          echo "Found images: $images"
          for image in $images; do
            echo "🔍 Scanning image: $image"
            trivy image --exit-code 0 \
              --severity HIGH,CRITICAL \
              --format table \
              $image
          done
          echo "✅ All images scanned!"

      - name: Summary
        run: |
          echo "✅ CI Pipeline completed!"
          echo "📦 ArgoCD will sync automatically to the cluster"
