name: GitOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply --dry-run=client --validate=false -f apps/nginx/deployment.yaml
          echo "✅ Manifests are valid!"

      - name: Check deployment files
        run: |
          echo "📁 Files changed:"
          git diff --name-only HEAD~1 HEAD || echo "Initial commit"
          echo "✅ CI Pipeline completed - ArgoCD will sync automatically"
