name: GitOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          kubeconform -strict apps/nginx/deployment.yaml
          echo "✅ Manifests are valid!"

      - name: Summary
        run: |
          echo "✅ CI Pipeline completed!"
          echo "📦 ArgoCD will sync automatically to the cluster"
